services:
  db:
    image: postgres:16
    container_name: postgres_container
    env_file:
      - ./.env
    volumes:
      - postgres_data:/var/lib/postgresql/data 
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
  migrations:
      build: 
        context: .
        target: build
      command: dotnet ef database update
      depends_on:
        db:
          condition: service_healthy
      env_file:
        - ./.env
  app:
    build: .
    ports: 
      - 5059:8080
    env_file:
      - ./.env
    depends_on:
      db:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
volumes:
  postgres_data: